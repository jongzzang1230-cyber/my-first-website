<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #ffffff; border: 1px solid #dde3f0; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(99,120,255,0.12); }
    .emoji { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; font-weight: 700; color: #3b4cca; margin-bottom: 14px; }
    .divider { width: 40px; height: 3px; background: #6378ff; margin: 0 auto 20px; border-radius: 2px; }
    p { font-size: 0.95rem; color: #555e8a; line-height: 1.9; margin-bottom: 6px; }
    .badge { display: inline-block; background: #6378ff; color: #fff; padding: 6px 18px; border-radius: 20px; font-size: 0.82rem; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요!</h1>
    <div class="divider"></div>
    <p>저의 첫 번째 웹사이트에 방문해주셔서 감사합니다.</p>
    <p>React와 MUI를 공부하며 성장하고 있는 개발자입니다.</p>
    <div class="badge">🚀 GitHub Pages로 배포됨</div>
  </div>
</body>
</html>

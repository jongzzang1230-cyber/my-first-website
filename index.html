<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #000; color: #c9d1d9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #0d1117; border: 1px solid #21262d; border-radius: 12px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(88,166,255,0.04); }
    .emoji { font-size: 52px; margin-bottom: 20px; filter: grayscale(20%); }
    h1 { font-size: 1.7rem; font-weight: 600; color: #e6edf3; margin-bottom: 14px; letter-spacing: -0.5px; }
    .divider { width: 40px; height: 2px; background: #30363d; margin: 0 auto 20px; border-radius: 2px; }
    p { font-size: 0.95rem; color: #8b949e; line-height: 1.8; margin-bottom: 6px; }
    .badge { display: inline-block; background: transparent; color: #58a6ff; border: 1px solid #1f6feb; padding: 5px 14px; border-radius: 6px; font-size: 0.8rem; margin-top: 28px; letter-spacing: 0.3px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요</h1>
    <div class="divider"></div>
    <p>저의 첫 번째 웹사이트에 방문해주셔서 감사합니다.</p>
    <p>React와 MUI를 공부하며 성장하고 있는 개발자입니다.</p>
    <div class="badge">🚀 GitHub Pages로 배포됨</div>
  </div>
</body>
</html>

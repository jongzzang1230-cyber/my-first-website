<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #030303; border: 1px solid #0e0e0e; border-radius: 10px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 0 120px rgba(0,0,0,1), inset 0 0 40px rgba(0,0,0,0.8); }
    .emoji { font-size: 48px; margin-bottom: 20px; filter: grayscale(100%) brightness(0.15); }
    h1 { font-size: 1.6rem; font-weight: 400; color: #1c1c1c; margin-bottom: 14px; }
    .divider { width: 30px; height: 1px; background: #0f0f0f; margin: 0 auto 20px; }
    p { font-size: 0.9rem; color: #161616; line-height: 1.9; margin-bottom: 6px; }
    .badge { display: inline-block; color: #111; border: 1px solid #0d0d0d; padding: 5px 14px; border-radius: 6px; font-size: 0.78rem; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요</h1>
    <div class="divider"></div>
    <p>저의 첫 번째 웹사이트에 방문해주셔서 감사합니다.</p>
    <p>React와 MUI를 공부하며 성장하고 있는 개발자입니다.</p>
    <div class="badge">🚀 GitHub Pages로 배포됨</div>
  </div>
</body>
</html>

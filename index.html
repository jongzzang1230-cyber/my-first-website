<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .emoji { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 1.8rem; font-weight: 700; color: #38bdf8; margin-bottom: 12px; }
    p { font-size: 1rem; color: #94a3b8; line-height: 1.7; margin-bottom: 8px; }
    .badge { display: inline-block; background: #0ea5e9; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요!</h1>
    <p>저의 첫 번째 웹사이트에 방문해주셔서 감사합니다.</p>
    <p>React와 MUI를 공부하며 성장하고 있는 개발자입니다.</p>
    <div class="badge">🚀 GitHub Pages로 배포됨</div>
  </div>
</body>
</html>

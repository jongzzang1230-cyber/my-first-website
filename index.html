<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #020202; color: #555; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #080808; border: 1px solid #141414; border-radius: 10px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 0 60px rgba(0,0,0,0.95); }
    .emoji { font-size: 48px; margin-bottom: 20px; filter: grayscale(80%) brightness(0.5); }
    h1 { font-size: 1.6rem; font-weight: 500; color: #333; margin-bottom: 14px; letter-spacing: -0.3px; }
    .divider { width: 30px; height: 1px; background: #1a1a1a; margin: 0 auto 20px; }
    p { font-size: 0.9rem; color: #3a3a3a; line-height: 1.9; margin-bottom: 6px; }
    .badge { display: inline-block; background: transparent; color: #2a2a2a; border: 1px solid #1e1e1e; padding: 5px 14px; border-radius: 6px; font-size: 0.78rem; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요</h1>
    <div class="divider"></div>
    <p>저의 첫 번째 웹사이트에 방문해주셔서 감사합니다.</p>
    <p>React와 MUI를 공부하며 성장하고 있는 개발자입니다.</p>
    <div class="badge">🚀 GitHub Pages로 배포됨</div>
  </div>
</body>
</html>
